<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MovieFlix</title>
    <!-- Đảm bảo đường dẫn này khớp với vị trí đặt file css trong Spring Boot -->
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">MovieFlix</div>

    <div class="menu">
        <span>Phim bộ</span>
        <span>Phim lẻ</span>
    </div>

    <select><option>Thể loại</option></select>
    <select><option>Quốc gia</option></select>
    <select><option>Năm phát hành</option></select>
    <a href="/add-new-movie">Thêm phim</a>


    <input type="text" placeholder="Tìm phim...">
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
</header>

<div class="welcome-text"></div>

<!-- CONTENT -->
<div class="container">
    <h2>🎯 Phim đề xuất cho bạn</h2>

    <!-- Danh sách phim hiển thị ở đây -->
    <div class="movie-row" id="recommend-list"></div>

    <!-- PHẦN PHÂN TRANG -->
    <div class="pagination-container">
        <button id="prev-btn" onclick="changePage(-1)">Trước</button>
        <span id="page-info">Trang 1 / 1</span>
        <button id="next-btn" onclick="changePage(1)">Sau</button>
    </div>
</div>

<!-- Đảm bảo đường dẫn này khớp với vị trí đặt file js trong Spring Boot -->
<script src="/js/index.js"></script>
</body>
</html>
